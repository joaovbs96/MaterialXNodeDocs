name: Bug Report
description: Report something broken in MaterialX Playground
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Load '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: view
    attributes:
      label: Which view?
      description: Where in the app did this happen?
      options:
        - Home
        - Node Library
        - Material Viewer
        - Node Graph Editor
        - VS Code extension
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser + version
      placeholder: e.g. Chrome 126.0.6478.126
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Windows 11
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      description: >-
        Find this at chrome://gpu (look for "GL_RENDERER") or in your
        system's About/Display dialog.
      placeholder: e.g. Apple M2, NVIDIA RTX 3060
    validations:
      required: false

  - type: textarea
    id: console-errors
    attributes:
      label: Console errors
      description: >-
        Open DevTools (F12 or Cmd+Option+I) → Console tab, and paste any
        errors here.
      render: shell
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        If this issue is triggered by a specific material, please attach or
        paste the `.mtlx` file that reproduces it, if applicable.
