site_name: MaterialX Playground — Tutorials
site_description: Tutorials and guides for the MaterialX Playground.
docs_dir: docs
site_dir: ../tutorials
use_directory_urls: false
theme:
  name: material
  custom_dir: overrides
  favicon: ../favicon.ico         # use the root SPA's favicon.ico (one dir up), not Material's default
  font: false                     # match the site's system sans stack
  palette:
    scheme: slate                 # dark; recolored in extra.css
  features: [navigation.sections, navigation.top, toc.follow, content.code.copy, search.suggest, search.highlight]
  # NOT navigation.tabs (shared header carries nav); NOT navigation.instant
  # (its XHR swap won't reliably re-run the injected header script).
extra_css: [assets/extra.css]
extra_javascript: []              # header scripts injected by main.html for exact order/position
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc: { permalink: true }
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.inlinehilite
  - pymdownx.tabbed: { alternate_style: true }
  - pymdownx.tasklist: { custom_checkbox: true }
plugins: [search]
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Your first node graph: your-first-node-graph.md
